<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الكابتن الملكية</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa7c11;
            --bg-dark: #0b0c10;
            --panel-bg: #1f2833;
            --red-alert: #cc2323;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .main-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .section-panel {
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        h2 {
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }
        /* تصميم شبكة الطاولات */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .table-card {
            background: #111;
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .table-card.active-call {
            background: var(--red-alert) !important;
            animation: pulse 1.5s infinite;
        }
        .table-card h4 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
        }
        .done-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: none;
        }
        .table-card.active-call .done-btn {
            display: inline-block;
        }
        /* تصميم قسم التعديل على المنيو */
        .menu-form input, .menu-form textarea, .menu-form select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #000;
            border: 1px solid var(--gold);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .primary-btn {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .current-menu-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            background: #111;
            padding: 10px;
            border-radius: 4px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        .delete-btn {
            background: var(--red-alert);
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--gold); margin-bottom: 30px;">نظام إدارة المطعم الملكي - الكابتن</h1>

    <div class="main-container">
        
        <!-- القسم الأول: التعديل على المنيو -->
        <div class="section-panel">
            <h2>⚙️ إدارة وتعديل القائمة</h2>
            <div class="menu-form">
                <h3>إضافة صنف جديد</h3>
                <label>القسم:</label>
                <input type="text" id="item-category" placeholder="مثال: الحلويات الملكية">
                <label>إسم الصنف:</label>
                <input type="text" id="item-name" placeholder="مثال: كنافة بالذهب">
                <label>الوصف:</label>
                <textarea id="item-desc" placeholder="وصف الصنف..."></textarea>
                <label>السعر:</label>
                <input type="text" id="item-price" placeholder="مثال: 30000 د.ع">
                <button class="primary-btn" onclick="addNewItem()">إضافة صنف للقائمة</button>
            </div>
            
            <h3>القائمة الحالية (للحذف)</h3>
            <div class="current-menu-list" id="current-menu-view"></div>
        </div>

        <!-- القسم الثاني: صالة الطاولات (50 طاولة) -->
        <div class="section-panel">
            <h2>🛎️ شاشة مراقبة الطاولات (50 طاولة)</h2>
            <div class="tables-grid" id="tables-container">
                <!-- سيتم توليد الـ 50 طاولة هنا عبر الجافاسكريبت -->
            </div>
        </div>

    </div>

    <script>
        // توليد 50 طاولة
        function initTables() {
            const container = document.getElementById('tables-container');
            container.innerHTML = '';
            for (let i = 1; i <= 50; i++) {
                container.innerHTML += `
                    <div class="table-card" id="table-${i}">
                        <h4>طاولة ${i}</h4>
                        <button class="done-btn" onclick="clearCall(${i})">تم ✅</button>
                    </div>`;
            }
            checkActiveCalls();
        }

        // فحص النداءات النشطة وتحديث الألوان للأحمر
        function checkActiveCalls() {
            const activeCalls = JSON.parse(localStorage.getItem('activeCalls')) || [];
            
            // إعادة تعيين كل الطاولات أولاً للوضع الطبيعي
            for (let i = 1; i <= 50; i++) {
                const tableDiv = document.getElementById(`table-${i}`);
                if (tableDiv) tableDiv.classList.remove('active-call');
            }

            // تلوين الطاولات المطلوبة بالأحمر
            activeCalls.forEach(tableNum => {
                const tableDiv = document.getElementById(`table-${tableNum}`);
                if (tableDiv) {
                    tableDiv.classList.add('active-call');
                }
            });
        }

        // عند ضغط الكابتن على زر "تم" لإرجاع الطاولة للونها الطبيعي
        function clearCall(tableNum) {
            let activeCalls = JSON.parse(localStorage.getItem('activeCalls')) || [];
            activeCalls = activeCalls.filter(num => num !== tableNum);
            localStorage.setItem('activeCalls', JSON.stringify(activeCalls));
            checkActiveCalls();
        }

        // دالة إضافة صنف جديد للمنيو وحفظه
        function addNewItem() {
            const category = document.getElementById('item-category').value.trim();
            const name = document.getElementById('item-name').value.trim();
            const desc = document.getElementById('item-desc').value.trim();
            const price = document.getElementById('item-price').value.trim();

            if (!category || !name || !price) {
                alert("يرجى ملء الحقول الأساسية (القسم، الاسم، السعر)");
                return;
            }

            let savedMenu = localStorage.getItem('royalMenu');
            let menu = savedMenu ? JSON.parse(savedMenu) : [];

            // البحث إذا كان القسم موجوداً مسبقاً لإضافة الصنف إليه، أو إنشاء قسم جديد
            let section = menu.find(s => s.category === category);
            if (!section) {
                section = { category: category, items: [] };
                menu.push(section);
            }

            section.items.push({ name, desc, price });
            localStorage.setItem('royalMenu', JSON.stringify(menu));
            
            alert("تمت إضافة الصنف بنجاح وتحديث منيو الزبائن!");
            renderCurrentMenu();
            
            // تفريغ الحقول
            document.getElementById('item-name').value = '';
            document.getElementById('item-desc').value = '';
            document.getElementById('item-price').value = '';
        }

        // عرض قائمة الأصناف الحالية في لوحة التحكم لإمكانية حذفها
        function renderCurrentMenu() {
            const savedMenu = localStorage.getItem('royalMenu');
            const view = document.getElementById('current-menu-view');
            if (!savedMenu) {
                view.innerHTML = "<p style='color:#777; text-align:center;'>القائمة فارغة حالياً</p>";
                return;
            }

            const menu = JSON.parse(savedMenu);
            view.innerHTML = '';

            menu.forEach((section, sIdx) => {
                section.items.forEach((item, iIdx) => {
                    view.innerHTML += `
                        <div class="list-item">
                            <span>[${section.category}] - ${item.name}</span>
                            <button class="delete-btn" onclick="deleteItem(${sIdx}, ${iIdx})">حذف</button>
                        </div>`;
                });
            });
        }

        // حذف صنف
        function deleteItem(sIdx, iIdx) {
            let menu = JSON.parse(localStorage.getItem('royalMenu'));
            menu[sIdx].items.splice(iIdx, 1);
            
            // إذا أصبح القسم فارغاً نقوم بحذفه تماماً
            if (menu[sIdx].items.length === 0) {
                menu.splice(sIdx, 1);
            }

            localStorage.setItem('royalMenu', JSON.stringify(menu));
            renderCurrentMenu();
        }

        // الاستماع للتحديثات القادمة من الزبائن (النداءات) بشكل حي ومباشر
        window.addEventListener('storage', (e) => {
            if (e.key === 'activeCalls') checkActiveCalls();
        });

        // تشغيل دوري للتأكد من التحديثات كل ثانية كدعم إضافي
        setInterval(checkActiveCalls, 1000);

        // التشغيل الأولي عند فتح الصفحة
        initTables();
        renderCurrentMenu();
    </script>
</body>
</html>
